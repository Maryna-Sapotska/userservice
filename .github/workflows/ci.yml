name: CI Pipeline

on:
  push:
    branches: [ "main", "develop", "features/**" ]
  pull_request:

jobs:
  build-test-analyze:

    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build + Test
        run: mvn clean verify -Dspring.profiles.active=test

      - name: Sonar
        run: >
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar
          -Dsonar.projectKey=Maryna-Sapotska_userservice
          -Dsonar.organization=maryna-sapotska
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t userservice:latest .

      - name: Save Docker image as artifact
        run: |
          docker save userservice:latest > userservice.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: userservice.tar